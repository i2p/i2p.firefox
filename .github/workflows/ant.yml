name: Java Latest CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'i2p-firefox-*.*.*'
      - 'i2p-firefox-*.*.*-*'
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:

jobs:
  nsis:
    runs-on: windows-latest
    env:
      GITHUB_TAG: ${{ github.ref_name }}
    steps:
      - uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-20.04
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global user.email "github@i2p.net"
          git config --global user.name "eyedeekay Github CI Build"
      - uses: actions/checkout@v4
      - run: wsl apt-get update
      - run: wsl apt-get install -y nsis nsis-common nsis-pluginapi wget dos2unix curl jq gpg gettext
      - name: Set up latest JDK
        uses: actions/setup-java@main
        with:
          java-version: 'latest'
          distribution: 'temurin'
      - name: build with script
        run: bash -c "./buildscripts/unsigned.sh; ls *.exe"
      - name: Upload archived copy of I2P router source embedded in the build
        uses: actions/upload-artifact@v4
        with:
          name: i2p.i2p.jpackage-build.tar.gz
          path: i2p.i2p.jpackage-build.tar.gz
      - name: Upload prebuilt jpackage bundle without any plugins or modded config
        uses: actions/upload-artifact@v4
        with:
          name: I2P-Prebuilt.zip
          path: I2P-Prebuilt.zip
      - name: Upload I2P-Easy-Install-Bundle-unsigned.exe
        uses: actions/upload-artifact@v4
        with:
          name: I2P-Easy-Install-Bundle-unsigned.exe
          path: I2P-Easy-Install-Bundle-*.exe

  buildjpackagexe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up latest JDK
        uses: actions/setup-java@main
        with:
          java-version: 'latest'
          distribution: 'temurin'
      - name: build with script
        run: bash -c "./buildscripts/exe.sh; ls *.exe"
      - name: Upload I2P-Easy-Install-Bundle-unsigned.exe
        uses: actions/upload-artifact@v4
        with:
          name: I2P-EXE-unsigned.exe
          path: I2P-EXE-*.exe

  buildjpackagmsi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up latest JDK
        uses: actions/setup-java@main
        with:
          java-version: 'latest'
          distribution: 'temurin'
      - name: build with script
        run: bash -c "./buildscripts/msi.sh; ls *.msi"
      - name: Upload I2P-Easy-Install-Bundle-unsigned.msi
        uses: actions/upload-artifact@v4
        with:
          name: I2P-MSI-unsigned.msi
          path: I2P-MSI-*.msi

  sign-nsis:
    needs: nsis
    runs-on: [ self-hosted, Windows, X64 ]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Download unsigned NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: I2P-Easy-Install-Bundle-unsigned.exe
      - name: Sign NSIS installer
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: |
          $exe = Get-ChildItem -Filter "I2P-Easy-Install-Bundle-*.exe" | Select-Object -First 1
          powershell -ExecutionPolicy Bypass -File ".github/scripts/sign-exe.ps1" -BinaryPath $exe.FullName
        shell: powershell
      - name: Upload signed NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: I2P-Easy-Install-Bundle-signed.exe
          path: I2P-Easy-Install-Bundle-*.exe

  sign-exe:
    needs: buildjpackagexe
    runs-on: [ self-hosted, Windows, X64 ]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Download unsigned EXE installer
        uses: actions/download-artifact@v4
        with:
          name: I2P-EXE-unsigned.exe
      - name: Sign EXE installer
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: |
          $exe = Get-ChildItem -Filter "I2P-EXE-*.exe" | Select-Object -First 1
          powershell -ExecutionPolicy Bypass -File ".github/scripts/sign-exe.ps1" -BinaryPath $exe.FullName
        shell: powershell
      - name: Upload signed EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: I2P-EXE-signed.exe
          path: I2P-EXE-*.exe

  sign-msi:
    needs: buildjpackagmsi
    runs-on: [ self-hosted, Windows, X64 ]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Download unsigned MSI installer
        uses: actions/download-artifact@v4
        with:
          name: I2P-MSI-unsigned.msi
      - name: Sign MSI installer
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: |
          $msi = Get-ChildItem -Filter "I2P-MSI-*.msi" | Select-Object -First 1
          powershell -ExecutionPolicy Bypass -File ".github/scripts/sign-exe.ps1" -BinaryPath $msi.FullName
        shell: powershell
      - name: Upload signed MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: I2P-MSI-signed.msi
          path: I2P-MSI-*.msi

  buildzip:
    runs-on: windows-latest
    steps:
      - uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-20.04
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global user.email "github@i2p.net"
          git config --global user.name "eyedeekay Github CI Build"
      - uses: actions/checkout@v4
      - run: wsl apt-get update
      - run: wsl apt-cache search 7zip
      - run: wsl apt-get install -y nsis nsis-common nsis-pluginapi wget dos2unix curl jq gpg gettext zip p7zip-full ca-certificates
      - run: choco install wget
      - name: Set up latest JDK
        uses: actions/setup-java@main
        with:
          java-version: 'latest'
          distribution: 'temurin'
      - name: build with script
        run: bash -c "./buildscripts/zip.sh; ls -d * */* "
      - name: Upload I2P-windows-portable.zip
        uses: actions/upload-artifact@v4
        with:
          name: I2P-windows-portable.zip
          path: I2P-windows-portable.zip

  buildtgz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up latest JDK
        uses: actions/setup-java@main
        with:
          java-version: 'latest'
          distribution: 'temurin'
      - run: |
          sudo apt-get update
          sudo apt-get install -y nsis nsis-common nsis-pluginapi wget dos2unix curl jq gpg gettext
      - name: build with script
        run: ./buildscripts/targz.sh; ls *.tar.gz
      - name: Upload I2P.tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: I2P.tar.gz
          path: I2P.tar.gz
